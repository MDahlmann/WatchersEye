name: Build & publish docker images

on:
  push:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: mdahlmann/poetracker-api
  IMAGE_NAME_CLIENT: mdahlmann/poetracker-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        run: |
          dotnet publish PoeLeagueTracker.Api/PoeLeagueTracker.Api.csproj \
            -c Release \
            /t:PublishContainer \
            -p:ContainerRegistry=${{ env.REGISTRY }} \
            -p:ContainerRepository=${{ env.IMAGE_NAME_API }} \
            -p:ContainerImageTag=latest

      - name: Build & push Client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.Client
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CLIENT }}:latest